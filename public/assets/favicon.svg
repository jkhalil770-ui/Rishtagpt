<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1740" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0F1E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6C56A"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#b78f30"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Gold glow halo -->
  <circle cx="50" cy="50" r="44" fill="rgba(201,168,76,0.12)" filter="url(#glow)"/>
  <!-- Crescent moon -->
  <path d="M65 50 a 22 22 0 1 1 -28 -20 a 16 16 0 0 0 28 20z" fill="url(#gold)" filter="url(#glow)"/>
  <!-- Letter R -->
  <text x="48" y="62" font-family="Georgia,serif" font-size="30" font-weight="bold" fill="url(#gold)" text-anchor="middle" filter="url(#glow)">R</text>
  <!-- Star sparkle -->
  <circle cx="72" cy="28" r="3" fill="#fff5cf" opacity="0.9"/>
  <line x1="72" y1="23" x2="72" y2="33" stroke="#E6C56A" stroke-width="1.2" opacity="0.7"/>
  <line x1="67" y1="28" x2="77" y2="28" stroke="#E6C56A" stroke-width="1.2" opacity="0.7"/>
</svg>
