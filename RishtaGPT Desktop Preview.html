<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RishtaGPT — Desktop Preview</title>
<link rel="icon" type="image/png" href="assets/logo.png" />
<link rel="shortcut icon" type="image/png" href="assets/logo.png" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #0A0F1E;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    color: #F5F0E8;
    font-family: system-ui, sans-serif;
  }
  .desktop-stage {
    width: 100%;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }
  .desktop-frame {
    width: 1440px;
    height: 900px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6);
    border-radius: 12px;
    overflow: hidden;
    background: #0A0F1E;
  }
  .desktop-frame iframe {
    width: 1440px;
    height: 900px;
    border: 0;
    display: block;
  }
  .hint {
    position: fixed;
    top: 14px; left: 14px;
    z-index: 10;
    font-size: 11px;
    color: rgba(245,240,232,0.55);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(0,0,0,0.4);
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div class="hint">Desktop preview · 1440 × 900</div>
<div class="desktop-stage" id="stage">
  <div class="desktop-frame" id="frame">
    <iframe src="RishtaGPT.html" id="inner"></iframe>
  </div>
</div>
<script>
  const FRAME_W = 1440;
  const FRAME_H = 900;
  const frame = document.getElementById('frame');

  function fit() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    // leave a tiny margin so the rounded corners are visible
    const pad = w < 700 ? 12 : 32;
    const sx = (w - pad * 2) / FRAME_W;
    const sy = (h - pad * 2) / FRAME_H;
    const s = Math.min(sx, sy);
    frame.style.transform = `translate(-50%, -50%) scale(${s})`;
  }

  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
