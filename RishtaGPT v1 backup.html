<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0A0F1E" />
<title>RishtaGPT — AI Rishta Bio Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg-0: #0A0F1E;
    --bg-1: #0e1428;
    --bg-2: #161a35;
    --gold: #C9A84C;
    --gold-2: #E6C56A;
    --gold-3: #8a6f24;
    --rose: #E8B4A0;
    --ink: #F5F0E8;
    --ink-soft: #8A8FA8;
    --ink-dim: #565a73;
    --glass: rgba(255,255,255,0.06);
    --glass-2: rgba(255,255,255,0.04);
    --glass-stroke: rgba(201,168,76,0.22);
    --glass-stroke-strong: rgba(201,168,76,0.5);
    --danger: #ff7575;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-0);
    color: var(--ink);
    font-family: "DM Sans", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    overflow-x: hidden;
  }
  .font-display { font-family: "Playfair Display", serif; }
  .font-urdu { font-family: "Noto Nastaliq Urdu", serif; }
  .font-body { font-family: "DM Sans", sans-serif; }

  /* ─── App shell — phone-sized on desktop, fullscreen on mobile ─── */
  .stage {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    position: relative;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, #1a1740 0%, transparent 60%),
      radial-gradient(ellipse 100% 80% at 100% 100%, #271a3a 0%, transparent 60%),
      var(--bg-0);
  }
  .phone {
    width: 100%;
    max-width: 430px;
    min-height: 100dvh;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 90% 50% at 50% 0%, rgba(102, 79, 198, 0.18) 0%, transparent 55%),
      radial-gradient(ellipse 100% 70% at 80% 100%, rgba(201, 168, 76, 0.08) 0%, transparent 60%),
      var(--bg-0);
  }
  @media (min-width: 480px) {
    .stage { padding: 32px 16px; }
    .phone {
      min-height: min(900px, calc(100dvh - 64px));
      max-height: 932px;
      border-radius: 44px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        0 60px 120px -40px rgba(0,0,0,0.7),
        0 0 0 8px #0a0911,
        0 0 0 9px rgba(201,168,76,0.08);
    }
  }

  /* ─── Geometric pattern overlay ─── */
  .pattern-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'><g fill='none' stroke='%23C9A84C' stroke-width='0.8'><polygon points='40,4 48,28 72,28 52,44 60,68 40,54 20,68 28,44 8,28 32,28'/><polygon points='40,20 44,32 56,32 46,40 50,52 40,46 30,52 34,40 24,32 36,32'/><circle cx='40' cy='40' r='32'/></g></svg>");
    background-size: 80px 80px;
    mix-blend-mode: screen;
  }

  /* ─── Particle canvas ─── */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ─── Glass primitives ─── */
  .glass {
    background: var(--glass);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
  }
  .glass-gold {
    background: linear-gradient(180deg, rgba(201,168,76,0.08), rgba(201,168,76,0.02));
    border: 1px solid var(--glass-stroke);
    border-radius: 20px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.06),
      0 12px 40px -20px rgba(201,168,76,0.25);
  }
  .gold-text {
    background: linear-gradient(135deg, #E6C56A 0%, #C9A84C 40%, #f1d98a 70%, #b78f30 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .gold-btn {
    background: linear-gradient(135deg, #E6C56A 0%, #C9A84C 50%, #b78f30 100%);
    color: #1a1304;
    border: 1px solid rgba(255, 230, 150, 0.5);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.5),
      0 12px 36px -10px rgba(201,168,76,0.45),
      0 0 0 1px rgba(201,168,76,0.2);
    font-weight: 600;
  }
  .gold-btn:active { transform: scale(0.98); }

  /* ─── Inputs ─── */
  .gi {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--ink);
    font-family: "DM Sans", sans-serif;
    font-size: 16px;
    transition: all 0.22s ease;
    outline: none;
  }
  .gi::placeholder { color: var(--ink-dim); }
  .gi:focus {
    border-color: rgba(201,168,76,0.7);
    background: rgba(201,168,76,0.06);
    box-shadow: 0 0 0 4px rgba(201,168,76,0.12), 0 0 24px -4px rgba(201,168,76,0.3);
  }
  select.gi {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%23C9A84C' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 16px center;
    padding-right: 40px;
  }
  select.gi option { background: #161a35; color: var(--ink); }
  textarea.gi { resize: none; min-height: 88px; }

  .label {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .label-soft {
    font-size: 11px;
    color: var(--ink-dim);
    margin-left: 6px;
    text-transform: none;
    letter-spacing: 0;
  }

  /* ─── Scrollbars ─── */
  .phone::-webkit-scrollbar { width: 0; }

  /* ─── Animations ─── */
  @keyframes float-up {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 12px 36px -10px rgba(201,168,76,0.45), 0 0 0 0 rgba(201,168,76,0.4); }
    50%      { box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 16px 48px -8px rgba(201,168,76,0.6),  0 0 0 8px rgba(201,168,76,0); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  @keyframes draw-check {
    to { stroke-dashoffset: 0; }
  }
  @keyframes drift {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(-110vh) translateX(20px); opacity: 0; }
  }
  @keyframes confetti-fall {
    0%   { transform: translate3d(var(--x,0),-20px,0) rotate(0deg); opacity: 1; }
    100% { transform: translate3d(calc(var(--x,0) + var(--dx,0)), 480px, 0) rotate(720deg); opacity: 0; }
  }
  @keyframes shimmer-sweep {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes spin-slow {
    to { transform: rotate(360deg); }
  }

  .anim-in        { animation: float-up 0.6s cubic-bezier(.2,.7,.2,1) both; }
  .anim-in-delay  { animation: float-up 0.6s cubic-bezier(.2,.7,.2,1) 0.18s both; }
  .anim-in-d2     { animation: float-up 0.6s cubic-bezier(.2,.7,.2,1) 0.32s both; }
  .anim-in-d3     { animation: float-up 0.6s cubic-bezier(.2,.7,.2,1) 0.46s both; }
  .anim-in-d4     { animation: float-up 0.6s cubic-bezier(.2,.7,.2,1) 0.60s both; }
  .pulse-anim     { animation: pulse-glow 2.6s ease-in-out infinite; }
  .shake-anim     { animation: shake 0.45s cubic-bezier(.36,.07,.19,.97); }

  .shimmer-text {
    background: linear-gradient(90deg, #E6C56A 0%, #fff5cf 30%, #E6C56A 60%, #C9A84C 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 2.6s linear infinite;
  }

  /* Step slide transitions */
  .step-enter { animation: float-up 0.4s cubic-bezier(.2,.7,.2,1) both; }

  /* Pill toggle */
  .pill-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 4px;
    position: relative;
    overflow: hidden;
  }
  .pill-toggle button {
    background: transparent;
    border: 0;
    color: var(--ink-soft);
    padding: 12px 0;
    font-weight: 500;
    font-size: 15px;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    z-index: 2;
    transition: color 0.25s ease;
  }
  .pill-toggle button.active { color: #1a1304; }
  .pill-thumb {
    position: absolute;
    top: 4px; bottom: 4px;
    width: calc(50% - 4px);
    border-radius: 10px;
    background: linear-gradient(135deg, #E6C56A 0%, #C9A84C 100%);
    transition: transform 0.32s cubic-bezier(.5,1.7,.5,1);
    box-shadow: 0 4px 16px -4px rgba(201,168,76,0.5);
    z-index: 1;
  }

  /* Icon card grid */
  .icard {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    min-height: 72px;
  }
  .icard:hover { border-color: rgba(201,168,76,0.3); }
  .icard.sel {
    background: linear-gradient(180deg, rgba(201,168,76,0.14), rgba(201,168,76,0.04));
    border-color: var(--glass-stroke-strong);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.3), 0 8px 24px -10px rgba(201,168,76,0.35);
  }
  .icard .ic-icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold-2);
  }
  .icard .ic-title { font-size: 14px; font-weight: 600; color: var(--ink); }
  .icard .ic-sub   { font-size: 11px; color: var(--ink-soft); }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 9px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--ink);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }
  .tag.sel {
    background: linear-gradient(135deg, rgba(201,168,76,0.22), rgba(201,168,76,0.08));
    border-color: rgba(201,168,76,0.55);
    color: var(--gold-2);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.25);
  }

  /* Range slider */
  .range {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    outline: none;
  }
  .range::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #E6C56A, #C9A84C);
    border: 2px solid #1a1304;
    box-shadow: 0 0 0 1px rgba(201,168,76,0.5), 0 4px 12px rgba(201,168,76,0.4);
    cursor: pointer;
  }
  .range::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #E6C56A, #C9A84C);
    border: 2px solid #1a1304;
    cursor: pointer;
  }

  /* Stepper */
  .stepper {
    display: flex; align-items: center; gap: 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    overflow: hidden;
  }
  .stepper button {
    width: 48px; height: 48px;
    border: 0; background: transparent;
    color: var(--gold-2); font-size: 20px; font-weight: 600;
    cursor: pointer;
  }
  .stepper button:active { background: rgba(201,168,76,0.1); }
  .stepper .val {
    flex: 1; text-align: center;
    font-size: 17px; font-weight: 600; color: var(--ink);
  }

  /* Trust pills */
  .trust {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    font-size: 12px;
    color: var(--ink);
    font-weight: 500;
  }
  .trust svg { color: var(--gold-2); }

  /* Drift particles overlay used in hero */
  .driftbox { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .driftbox span {
    position: absolute;
    bottom: -10px;
    width: 4px; height: 4px;
    background: var(--gold-2);
    border-radius: 50%;
    opacity: 0.6;
    box-shadow: 0 0 8px rgba(230,197,106,0.7);
    animation: drift linear infinite;
  }

  /* Confetti */
  .confetti {
    position: absolute;
    width: 8px; height: 12px;
    background: var(--gold-2);
    top: 0; left: 50%;
    animation: confetti-fall 2.2s ease-out forwards;
    pointer-events: none;
  }

  /* Bottom sheet */
  @keyframes sheet-in {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .sheet-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    z-index: 50;
    animation: fade-in 0.28s ease both;
  }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, #1c1840 0%, #0f0e26 100%);
    border-top-left-radius: 28px; border-top-right-radius: 28px;
    border-top: 1px solid rgba(201,168,76,0.3);
    z-index: 51;
    padding: 20px 22px max(28px, env(safe-area-inset-bottom));
    animation: sheet-in 0.45s cubic-bezier(.2,.7,.2,1) both;
    box-shadow: 0 -20px 60px -10px rgba(0,0,0,0.5);
  }

  /* Header bar */
  .topbar {
    position: sticky; top: 0;
    z-index: 30;
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(10,15,30,0.85), rgba(10,15,30,0.55) 70%, transparent);
    backdrop-filter: blur(12px);
  }
  .iconbtn {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .iconbtn:active { transform: scale(0.94); }
  .iconbtn.gold { color: var(--gold-2); border-color: rgba(201,168,76,0.3); }

  /* Crescent in corner */
  .crescent {
    position: absolute;
    top: 60px; right: -30px;
    width: 200px; height: 200px;
    opacity: 0.18;
    pointer-events: none;
  }

  /* Output card cream paper */
  .paper {
    background: linear-gradient(180deg, #fbf5e6 0%, #f5ecd4 100%);
    color: #2b2412;
    border-radius: 20px;
    position: relative;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.6),
      0 16px 50px -10px rgba(0,0,0,0.5),
      0 0 0 1px rgba(201,168,76,0.3);
  }
  .paper .corner { position: absolute; width: 32px; height: 32px; color: rgba(201,168,76,0.55); }

  /* Sweep shimmer over paper */
  .paper.loading::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: shimmer-sweep 1.6s linear infinite;
    border-radius: 20px;
    pointer-events: none;
  }

  /* Progress segments */
  .seg {
    flex: 1; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px; overflow: hidden;
    position: relative;
  }
  .seg .fill {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, #E6C56A, #C9A84C);
    transform-origin: left center;
    transition: transform 0.6s cubic-bezier(.2,.7,.2,1);
  }
  .stepdot {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--ink-soft);
    font-size: 12px; font-weight: 600;
    transition: all 0.3s ease;
  }
  .stepdot.active {
    background: linear-gradient(135deg, #E6C56A, #C9A84C);
    color: #1a1304;
    border-color: rgba(255,230,150,0.5);
    box-shadow: 0 0 0 4px rgba(201,168,76,0.18), 0 4px 14px rgba(201,168,76,0.4);
  }
  .stepdot.done {
    background: rgba(201,168,76,0.18);
    border-color: rgba(201,168,76,0.5);
    color: var(--gold-2);
  }

  /* Premium upgrade card glow */
  .premiumcard {
    background: linear-gradient(135deg, rgba(201,168,76,0.12) 0%, rgba(232,180,160,0.08) 100%);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 18px;
    box-shadow: 0 0 60px -20px rgba(201,168,76,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* Utility */
  .hide-scroll::-webkit-scrollbar { display: none; }
  .hide-scroll { scrollbar-width: none; }

  /* Disabled state */
  button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>

<body>

<div class="stage">
  <div id="root" class="phone"></div>
</div>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          gold: '#C9A84C',
          gold2: '#E6C56A',
          rose: '#E8B4A0',
          ink: '#F5F0E8',
          'ink-soft': '#8A8FA8',
          'ink-dim': '#565a73',
          bg0: '#0A0F1E',
        },
        fontFamily: {
          display: ['"Playfair Display"', 'serif'],
          body: ['"DM Sans"', 'sans-serif'],
          urdu: ['"Noto Nastaliq Urdu"', 'serif'],
        }
      }
    }
  };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="rishtagpt/icons.jsx"></script>
<script type="text/babel" src="rishtagpt/ui.jsx"></script>
<script type="text/babel" src="rishtagpt/hero.jsx"></script>
<script type="text/babel" src="rishtagpt/form.jsx"></script>
<script type="text/babel" src="rishtagpt/result.jsx"></script>
<script type="text/babel" src="rishtagpt/premium.jsx"></script>
<script type="text/babel" src="rishtagpt/app.jsx"></script>

</body>
</html>
